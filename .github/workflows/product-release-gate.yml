name: product-release-gate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - 'product-v*'

permissions:
  contents: read

jobs:
  qa:
    name: Product QA
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Run product QA
        run: npm run qa

      - name: Verify release docs exist
        run: |
          test -f docs/technical-architecture.md
          test -f docs/release-pipeline.md
          test -f scripts/check-docs.mjs
